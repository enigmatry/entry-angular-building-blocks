@if (props.options | formlySelectOptions: field | async; as selectOptions) {
    <input type="text"
    matInput
    #input
    [matAutocomplete]="auto"
    [formControl]="control"
    [formlyAttributes]="field"
    [placeholder]="props.placeholder ?? ''"
    [required]="props.required ?? false"
    [errorStateMatcher]="errorStateMatcher"
    [options]="selectOptions"
    entryCheckAutocompleteInput>
  <mat-autocomplete #auto="matAutocomplete"
    [autoActiveFirstOption]="true"
    [displayWith]="selectOptions | displayWithAutocomplete">
    @for (option of selectOptions | filterWithAutocomplete: input.value; track option.value) {
      <mat-option [value]="option.value">
        {{ option.label }}
      </mat-option>
    }
  </mat-autocomplete>
}
