<button
 #fileButton
 mat-button
 entry-submit-button
 type="button"
 [disabled]="disabled || readonly"
 aria-controls="fileInput"
 aria-label="Upload Files">
  @if (matIcon) {
    <mat-icon>{{matIcon}}</mat-icon>
  }
  <span>{{label}}</span>
</button>
@if (value) {
  {{fileNames}}
}
<input
 #fileInput
 type="file"
 class="file-input-hidden"
 [accept]="accept"
 [multiple]="multiple"
 [disabled]="disabled"
 [readonly]="readonly"
 (change)="onFileSelect($event)"
 aria-label="File Upload"
 id="fileInput"
/>
