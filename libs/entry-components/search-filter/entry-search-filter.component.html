<form (ngSubmit)="onSubmit()" [formGroup]="searchFilterForm" class="search-form-container entry-form">
    <entry-form-errors [form]="searchFilterForm"></entry-form-errors>
    @for (searchFilter of searchFilters; track searchFilter.key) {
        <div class="form-field">
            @switch (searchFilter.controlType) {
                @case (controlType.text) {
                    <entry-text-search-filter [searchFilter]="asTextSearchFilter(searchFilter)" [form]="searchFilterForm"></entry-text-search-filter>
                }
                @case (controlType.select) {
                    <entry-select-search-filter [searchFilter]="asSelectSearchFilter(searchFilter)" [form]="searchFilterForm"></entry-select-search-filter>
                }
                @case (controlType.autocomplete) {
                    <entry-autocomplete-search-filter [searchFilter]="asAutocompleteSearchFilter(searchFilter)"></entry-autocomplete-search-filter>
                }
                @case (controlType.dateTime) {
                    <entry-date-time-search-filter [searchFilter]="asDateTimeSearchFilter(searchFilter)" [form]="searchFilterForm"></entry-date-time-search-filter>
                }
                @case (controlType.date) {
                    <entry-date-search-filter [searchFilter]="asDateSearchFilter(searchFilter)" [form]="searchFilterForm"></entry-date-search-filter>
                }
            }
        </div>
    }
    <div class="entry-search-filter-actions">
        <button mat-button entry-submit-button>
            <span>{{config.applyButtonText}}</span>
        </button>
    </div>
</form>
